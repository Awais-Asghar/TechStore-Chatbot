<!DOCTYPE html>
<!--
  Standalone test page for the techstore.com.pk chatbot.
  This has nothing to do with WordPress, just open this file in any
  browser (double-click it) once BACKEND_URL below points to your
  live Vercel deployment, and you can test the bot in isolation.
-->
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>techstore.com.pk Chatbot - Test Page</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    display: flex;
    justify-content: center;
    padding-top: 40px;
  }
  #ts-chat-window {
    width: 360px;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    overflow: hidden;
  }
  #ts-chat-header {
    background: #1D9E75; color: #fff; padding: 14px 16px; font-weight: bold;
  }
  #ts-chat-messages {
    padding: 12px; overflow-y: auto; font-size: 14px; height: 400px;
  }
  .ts-msg { margin-bottom: 10px; line-height: 1.4; }
  .ts-msg.user { text-align: right; color: #0c447c; }
  .ts-msg.bot { text-align: left; color: #222; }
  #ts-chat-input-row {
    display: flex; border-top: 1px solid #eee;
  }
  #ts-chat-input {
    flex: 1; border: none; padding: 12px; font-size: 14px; outline: none;
  }
  #ts-chat-send {
    border: none; background: #1D9E75; color: #fff; padding: 0 18px; cursor: pointer;
  }
  #ts-status {
    text-align: center; font-size: 12px; color: #888; margin-top: 10px;
  }
</style>
</head>
<body>

<div>
  <div id="ts-chat-window">
    <div id="ts-chat-header">techstore.com.pk assistant (test mode)</div>
    <div id="ts-chat-messages">
      <div class="ts-msg bot">Hi! Ask me about products, shipping, or returns.</div>
    </div>
    <div id="ts-chat-input-row">
      <input id="ts-chat-input" type="text" placeholder="Type your question..." />
      <button id="ts-chat-send">Send</button>
    </div>
  </div>
  <div id="ts-status">Not connected yet, set BACKEND_URL in this file.</div>
</div>

<script>
  // Change this after you deploy to Vercel, e.g.
  // "https://techstore-chatbot.vercel.app/api/chat"
  const BACKEND_URL = "https://techstore-chatbot.vercel.app/api/chat";

  const messages = document.getElementById("ts-chat-messages");
  const input = document.getElementById("ts-chat-input");
  const sendBtn = document.getElementById("ts-chat-send");
  const status = document.getElementById("ts-status");

  if (!BACKEND_URL.includes("your-project")) {
    status.textContent = "Connected to: " + BACKEND_URL;
  }

  function addMessage(text, sender) {
    const div = document.createElement("div");
    div.className = "ts-msg " + sender;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";
    addMessage("Typing...", "bot");

    try {
      const res = await fetch(BACKEND_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();

      messages.removeChild(messages.lastChild);
      addMessage(data.reply || "Sorry, something went wrong.", "bot");
    } catch (err) {
      messages.removeChild(messages.lastChild);
      addMessage("Could not connect to backend. Check BACKEND_URL and try again.", "bot");
    }
  }

  sendBtn.addEventListener("click", sendMessage);
  input.addEventListener("keypress", (e) => {
    if (e.key === "Enter") sendMessage();
  });
</script>

</body>
</html>
